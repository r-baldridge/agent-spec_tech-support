    default: 5
    type: integer
  outputs:
  - description: List of similar past incidents
    title: incidents
    items:
      title: incident
      properties:
        incident_id:
          title: incident_id
          type: string
        title:
          title: title
          type: string
        root_cause:
          title: root_cause
          type: string
        resolution:
          title: resolution
          type: string
        severity:
          title: severity
          type: string
        date:
          title: date
          type: string
      type: object
    type: array
  requires_confirmation: false
