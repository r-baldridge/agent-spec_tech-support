component_type: Agent
id: 61074bd1-45f0-4f85-a000-3e9dadc4f894
name: expert_reviewer
description: Expert reviewer that independently verifies diagnoses, validates remediations,
  and produces a final quality verdict.
metadata: {}
inputs: []
outputs: []
llm_config:
  component_type: OpenAiCompatibleConfig
  id: de34de58-3e87-411a-9909-d0166d48c7c1
  name: claude_reviewer
  description: null
  metadata: {}
  default_generation_parameters:
    max_tokens: 16384
    temperature: 0.1
  url: http://localhost:4000/v1
  model_id: claude-sonnet-4-20250514
  api_type: chat_completions
  api_key: ''
system_prompt: "You are the expert reviewer, the final quality gate for all diagnostic\
  \ and remediation work. You operate independently from the working agents to provide\
  \ an unbiased assessment.\n\n## Your Responsibilities\n1. **Verify diagnosis**:\
  \ Independently verify the root cause using read-only    tools. Check that the evidence\
  \ supports the conclusion.\n2. **Validate remediation**: Confirm the fix addresses\
  \ the root cause, not    just the symptoms. Check for side effects.\n3. **Safety\
  \ check**: Ensure no unsafe operations were performed without    approval. Verify\
  \ rollback procedures exist.\n4. **Completeness check**: Ensure all aspects of the\
  \ issue are addressed,    monitoring is in place, and documentation is updated.\n\
  5. **Produce verdict**: Issue one of:\n   - APPROVED: Diagnosis correct, remediation\
  \ safe and complete\n   - MODIFY: Mostly correct, minor adjustments needed (specify\
  \ what)\n   - REWORK: Significant issues found, needs re-investigation (specify\
  \ why)\n   - REJECTED: Diagnosis incorrect or remediation dangerous (explain)\n\n\
  ## Verdict Format\n```\nVERDICT: [APPROVED|MODIFY|REWORK|REJECTED]\nCONFIDENCE:\
  \ [HIGH|MEDIUM|LOW]\nRISK_RATING: [CRITICAL|HIGH|MEDIUM|LOW|NONE]\n\nDIAGNOSIS_REVIEW:\n\
  [Your independent assessment of the root cause]\n\nREMEDIATION_REVIEW:\n[Your assessment\
  \ of the fix and its safety]\n\nREMAINING_RISKS:\n[Any residual risks or follow-up\
  \ actions needed]\n\nNEXT_STEPS:\n[Recommended follow-up actions]\n```\n"
tools:
- component_type: ServerTool
  id: e54dfb3a-2e49-4ace-a282-a4e2672a4413
  name: shell_read_only
  description: Execute a read-only shell command on the target system. Limited to
    safe, non-destructive commands such as viewing files, checking system status,
    listing processes, and reading logs. No human approval is required.
  metadata: {}
  inputs:
  - description: The read-only shell command to execute
    title: command
    type: string
  - description: Working directory for command execution
    title: working_directory
    default: /tmp
    type: string
  - description: Maximum execution time in seconds
    title: timeout_seconds
    default: 30
    type: integer
  outputs:
  - description: Standard output from the command
    title: stdout
    type: string
  - description: Standard error from the command
    title: stderr
    type: string
  - description: Exit code of the command (0 = success)
    title: exit_code
    type: integer
  requires_confirmation: false
- component_type: ServerTool
  id: fa5f7e4f-7271-46c9-bc82-00e1e02baa64
  name: knowledge_search
  description: Search the knowledge base for documentation, runbooks, troubleshooting
    guides, and architectural documents. Returns relevant snippets ranked by relevance.
  metadata: {}
  inputs:
  - description: Natural-language search query
    title: query
    type: string
  - description: Optional domain filter (e.g., 'networking', 'database', 'security')
    title: domain
    default: ''
    type: string
  - description: Maximum number of results to return
    title: max_results
    default: 5
    type: integer
  outputs:
  - description: List of matching knowledge base entries
    title: results
    items:
      title: entry
      properties:
        title:
          title: title
          type: string
        content:
          title: content
          type: string
        source:
          title: source
          type: string
        relevance_score:
          title: relevance_score
          type: string
      type: object
    type: array
  requires_confirmation: false
- component_type: ServerTool
  id: 02099239-e4b1-4c6e-9af6-6b7ff4cb9423
  name: incident_history_search
  description: Search past incident records for similar issues, including root causes,
    resolutions, and post-mortem notes. Useful for identifying recurring problems
