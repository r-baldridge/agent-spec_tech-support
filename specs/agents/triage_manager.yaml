component_type: Agent
id: 5499bb91-3580-4c28-8923-fce8db67bb86
name: triage_manager
description: Triage manager that classifies incoming technical issues by domain and
  severity, then delegates to the appropriate specialist.
metadata: {}
inputs: []
outputs: []
llm_config:
  component_type: OpenAiCompatibleConfig
  id: a361551f-c15e-43d4-82fd-445020095e6c
  name: claude_manager
  description: null
  metadata: {}
  default_generation_parameters:
    max_tokens: 4096
    temperature: 0.3
  url: http://localhost:4000/v1
  model_id: claude-sonnet-4-20250514
  api_type: chat_completions
  api_key: ''
system_prompt: "You are the triage manager responsible for analyzing incoming technical\
  \ issues and routing them to the appropriate domain specialist.\n\n## Your Responsibilities\n\
  1. **Classify** the issue by technical domain (networking, database, os_linux, \
  \   cloud_infra, application_code, security, cicd, monitoring).\n2. **Assess severity**\
  \ using the P1-P4 scale:\n   - P1: Critical, production down, revenue-impacting\n\
  \   - P2: High, major feature degraded, workaround exists\n   - P3: Medium, minor\
  \ feature impacted, low business impact\n   - P4: Low, cosmetic or informational\n\
  3. **Delegate** to the most appropriate specialist based on symptoms.\n4. **Monitor**\
  \ progress and escalate when:\n   - The specialist cannot resolve within the expected\
  \ timeframe\n   - The issue spans multiple domains (trigger swarm mode)\n   - The\
  \ severity increases based on new findings\n5. **Create and update tickets** to\
  \ maintain an accurate record.\n\n## Delegation Strategy\n- Single-domain issues:\
  \ delegate to one specialist\n- Cross-domain or ambiguous: start with the primary\
  \ domain, allow escalation\n- P1 incidents: consider swarm mode immediately\n- Unknown\
  \ domain: start with the specialist whose tools best match the symptoms\n\n## Output\
  \ Format\nAlways include:\n- Domain classification with confidence level\n- Severity\
  \ assessment with justification\n- Selected specialist and rationale\n- Initial\
  \ ticket creation if none exists\n"
tools:
- component_type: ServerTool
  id: fa5f7e4f-7271-46c9-bc82-00e1e02baa64
  name: knowledge_search
  description: Search the knowledge base for documentation, runbooks, troubleshooting
    guides, and architectural documents. Returns relevant snippets ranked by relevance.
  metadata: {}
  inputs:
  - description: Natural-language search query
    title: query
    type: string
  - description: Optional domain filter (e.g., 'networking', 'database', 'security')
    title: domain
    default: ''
    type: string
  - description: Maximum number of results to return
    title: max_results
    default: 5
    type: integer
  outputs:
  - description: List of matching knowledge base entries
    title: results
    items:
      title: entry
      properties:
        title:
          title: title
          type: string
        content:
          title: content
          type: string
        source:
          title: source
          type: string
