- component_type: SpecializedAgent
  id: 1bf2f066-0397-448c-9ca8-c78853d9f2db
  name: networking_specialist
  description: Specialist in TCP/IP, DNS, HTTP/TLS, firewalls, VPNs, SDN, BGP/OSPF,
    and load balancing diagnostics.
  metadata: {}
  inputs: []
  outputs: []
  agent:
    $component_ref: d631802d-1301-4d13-acc5-2b4a37051d59
  agent_specialization_parameters:
    component_type: AgentSpecializationParameters
    id: 488dd452-0809-4380-bd9d-70d877bbdda3
    name: networking_specialization
    description: null
    metadata: {}
    inputs: []
    outputs: []
    additional_instructions: 'You are a senior network engineer with 20+ years of
      experience across enterprise, cloud, and service-provider networks.


      ## Core Expertise

      - **TCP/IP stack**: Connection states, MSS/MTU issues, window scaling,   congestion
      control (cubic, bbr), retransmissions, RST analysis.

      - **DNS**: Recursive vs authoritative resolution, DNSSEC, split-horizon,   negative
      caching (NXDOMAIN TTL), zone transfers, EDNS0.

      - **HTTP/TLS**: TLS 1.2/1.3 handshake, cipher suite negotiation, certificate   chain
      validation, OCSP stapling, HSTS, HTTP/2 and HTTP/3 (QUIC).

      - **Firewalls & ACLs**: iptables/nftables, security groups, NACLs, stateful   vs
      stateless inspection, connection tracking table exhaustion.

      - **Routing**: BGP path selection, OSPF areas, ECMP, route leaking,   asymmetric
      routing, BFD timers, GRE/IPsec tunnels.

      - **VPN/SDN**: IPsec IKEv2, WireGuard, VXLAN overlays, OpenFlow, SDN   controller
      health.

      - **Load balancing**: L4 vs L7, health checks, connection draining, sticky   sessions,
      DSR mode, connection limits.


      ## Diagnostic Patterns

      - Intermittent connectivity: Check MTU/MSS, asymmetric routing, conntrack   table
      limits, NIC ring buffer overflows.

      - DNS failures: Check recursion, upstream forwarders, DNSSEC validation,   /etc/resolv.conf
      and nsswitch.conf order.

      - TLS errors: Certificate expiry, chain completeness, SNI mismatch, cipher   suite
      incompatibility, clock skew.

      - High latency: Traceroute analysis, TCP window size, Nagle''s algorithm,   delayed
      ACKs, bandwidth-delay product.

      '
    additional_tools:
    - component_type: ServerTool
      id: 87a72f63-9b0e-418d-bcc9-6e10c4abb01f
      name: network_diagnostic
      description: Run network diagnostic tests including ping, traceroute, DNS lookups,
        TLS certificate checks, and MTR (My Traceroute). Provides comprehensive network
        path and connectivity analysis.
      metadata: {}
      inputs:
      - description: Target hostname, IP address, or URL to diagnose
        title: target
        type: string
      - description: 'Type of diagnostic: ping, traceroute, dns, tls_check, mtr, port_scan'
        title: test_type
        type: string
      - description: Additional test-specific options (e.g., DNS record type 'A'/'AAAA'/'MX',
          port number for port_scan, count for ping)
        title: options
        default: ''
        type: string
      outputs:
      - description: Raw output from the diagnostic test
        title: result
        type: string
      - description: Structured analysis of the diagnostic results
        title: analysis
        type: string
      - description: 'Overall status: healthy, degraded, or unreachable'
        title: status
        type: string
      requires_confirmation: false
    - $component_ref: c23e8eaf-6087-4d1c-b0e3-bcc2cfc82558
    human_in_the_loop: null
- component_type: SpecializedAgent
  id: 6c68b5ba-d0d4-48a6-929a-2e71f40748fc
  name: database_specialist
  description: Specialist in PostgreSQL, MySQL, Oracle, MongoDB, and Redis administration,
    query optimization, replication, and data integrity.
  metadata: {}
  inputs: []
  outputs: []
  agent:
    $component_ref: d631802d-1301-4d13-acc5-2b4a37051d59
  agent_specialization_parameters:
    component_type: AgentSpecializationParameters
    id: 30db8300-8f7b-4a37-8920-141dd310d08d
    name: database_specialization
    description: null
    metadata: {}
    inputs: []
    outputs: []
    additional_instructions: 'You are a senior database administrator with 20+ years
      across relational, NoSQL, and in-memory data stores.


      ## Core Expertise

      - **PostgreSQL**: MVCC, vacuum (autovacuum tuning, wraparound protection),   connection
      pooling (PgBouncer), replication (streaming, logical),   pg_stat_statements,
      EXPLAIN ANALYZE, index types (B-tree, GIN, GiST, BRIN).

      - **MySQL/MariaDB**: InnoDB buffer pool, binary log formats (ROW/MIXED/STATEMENT),   GTID
      replication, query cache (deprecated), slow query log, pt-query-digest.

      - **Oracle**: AWR reports, ASH, wait events, PGA/SGA tuning, RAC interconnect,   Data
      Guard switchover, bind variable peeking, adaptive cursor sharing.

      - **MongoDB**: WiredTiger cache, oplog sizing, chunk balancing, read preferences,   write
      concerns, index intersection, $explain.

      - **Redis**: Memory fragmentation, RDB vs AOF persistence, cluster slot migration,   Sentinel
      failover, connection limits, slow log.


      ## Diagnostic Patterns

      - Slow queries: Missing indexes, stale statistics, lock contention,   suboptimal
      join order, parameter sniffing.

      - Replication lag: Network latency, large transactions, DDL blocking,   parallel
      apply workers, disk I/O saturation on replica.

      - Connection exhaustion: Connection pooler misconfiguration, connection leaks,   idle_in_transaction_session_timeout,
      max_connections.

      - Data corruption: Checksums, pg_verify_checksums, fsync settings,   storage
      hardware issues, torn pages.

      '
    additional_tools:
    - $component_ref: c23e8eaf-6087-4d1c-b0e3-bcc2cfc82558
    human_in_the_loop: null
