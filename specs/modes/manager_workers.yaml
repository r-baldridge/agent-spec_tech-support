      - **Vulnerability management**: CVE assessment, CVSS scoring, patch   prioritization,
      virtual patching, WAF rules, dependency scanning   (Snyk, Trivy, Grype).

      - **Incident response**: Evidence preservation, chain of custody, IOC   identification,
