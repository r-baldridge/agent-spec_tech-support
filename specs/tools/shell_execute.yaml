component_type: ServerTool
id: c23e8eaf-6087-4d1c-b0e3-bcc2cfc82558
name: shell_execute
description: Execute a shell command on the target system. Write operations require
  human approval before execution. Use this tool when you need to make changes to
  the system, install packages, restart services, or modify files.
metadata: {}
inputs:
- description: The shell command to execute
  title: command
  type: string
- description: Working directory for command execution
  title: working_directory
  default: /tmp
  type: string
- description: Maximum execution time in seconds
  title: timeout_seconds
  default: 60
  type: integer
outputs:
- description: Standard output from the command
  title: stdout
  type: string
- description: Standard error from the command
  title: stderr
  type: string
- description: Exit code of the command (0 = success)
  title: exit_code
  type: integer
requires_confirmation: true
agentspec_version: 25.4.2
